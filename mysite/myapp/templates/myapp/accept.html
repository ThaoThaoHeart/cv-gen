<html>
	<head>
		<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
	</head>
	<body class="bg-gray-100 min-h-screen flex items-center justify-center">
		<div class="bg-white shadow-md rounded-2xl p-8 w-full max-w-lg">
			<h2 class="text-2xl font-bold text-gray-800 mb-6">Create Profile</h2>
			<form action="" class="space-y-4">
				{% csrf_token %}
				<div class="flex flex-col gap-1">
					<label class="text-sm font-medium text-gray-700" for="">Name</label>
					<input class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" type="text" name="" id="">
				</div>
				<div class="flex flex-col gap-1">
					<label class="text-sm font-medium text-gray-700" for="">Email</label>
					<input class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" type="text" name="" id="">
				</div>
				<div class="flex flex-col gap-1">
					<label class="text-sm font-medium text-gray-700" for="">Phone</label>
					<input class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" type="text" name="" id="">
				</div>
				<div class="flex flex-col gap-1">
					<label class="text-sm font-medium text-gray-700" for="">Degree</label>
					<input class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" type="text" name="" id="">
				</div>
				<div class="flex flex-col gap-1">
					<label class="text-sm font-medium text-gray-700" for="">School</label>
					<input class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" type="text" name="" id="">
				</div>
				<div class="flex flex-col gap-1">
					<label class="text-sm font-medium text-gray-700" for="">University</label>
					<input class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" type="text" name="" id="">
				</div>
				<div class="flex flex-col gap-1">
					<label class="text-sm font-medium text-gray-700" for="">Summary</label>
					<input class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" type="text" name="" id="">
				</div>
				<div class="flex flex-col gap-1">
					<label class="text-sm font-medium text-gray-700" for="">Previous Work</label>
					<input class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" type="text" name="" id="">
				</div>
				<div class="flex flex-col gap-1">
					<label class="text-sm font-medium text-gray-700" for="">Skills</label>
					<input class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" type="text" name="" id="">
				</div>
				<button class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition-colors mt-2">Submit</button>
			</form>
		</div>
	</body>
</html>
